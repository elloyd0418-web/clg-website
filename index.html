<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Card Lloyd Group — Precision by Design</title>
<meta name="description" content="The Card Lloyd Group is a drone intelligence holding company advising and operating at the intersection of infrastructure, data, and precision." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sorts+Mill+Goudy:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --copper: #c8a86a;
    --copper-deep: #8a7a56;
    --near-black: #12100c;
    --near-black-soft: #1a1713;
    --cream: #f0e8d4;
    --cream-soft: #e8dfc5;
    --serif: 'Sorts Mill Goudy', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    font-weight: 300;
    background: var(--near-black);
    color: var(--cream);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  .serif { font-family: var(--serif); font-weight: 400; }
  .italic { font-style: italic; }
  .copper { color: var(--copper); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--near-black); }
  ::-webkit-scrollbar-thumb { background: var(--copper-deep); }

  /* Layout */
  .shell { min-height: 100vh; }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 40px; }
  @media (max-width: 768px) { .container { padding: 0 24px; } }

  /* Nav */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 20px 0;
    background: rgba(18,16,12,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(200,168,106,0.15);
  }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: var(--serif); font-size: 20px; letter-spacing: 0.04em; }
  .logo .mark { color: var(--copper); }
  .nav-links { display: flex; gap: 32px; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; }
  .nav-links a { opacity: 0.75; transition: opacity 0.2s, color 0.2s; }
  .nav-links a:hover { opacity: 1; color: var(--copper); }
  @media (max-width: 900px) { .nav-links { display: none; } }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 28px; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase;
    transition: all 0.25s; cursor: pointer;
  }
  .btn-primary {
    background: var(--copper); color: var(--near-black); font-weight: 500;
  }
  .btn-primary:hover { background: var(--cream); }
  .btn-ghost {
    border: 1px solid var(--copper); color: var(--copper);
  }
  .btn-ghost:hover { background: var(--copper); color: var(--near-black); }

  /* Hero */
  .hero { padding: 180px 0 120px; position: relative; }
  .hero-eyebrow {
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--copper);
    margin-bottom: 32px;
  }
  .hero h1 {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(44px, 7vw, 88px); line-height: 1.05; letter-spacing: -0.02em;
    max-width: 1100px; margin-bottom: 32px;
  }
  .hero h1 .emphasis { font-style: italic; color: var(--copper); }
  .hero p.lede {
    font-size: 19px; line-height: 1.6; max-width: 720px; opacity: 0.85;
    margin-bottom: 44px;
  }
  .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; }

  /* Ticker */
  .ticker {
    margin-top: 96px; padding: 20px 0;
    border-top: 1px solid rgba(200,168,106,0.15);
    border-bottom: 1px solid rgba(200,168,106,0.15);
    overflow: hidden; white-space: nowrap;
  }
  .ticker-inner {
    display: inline-flex; animation: scroll 50s linear infinite; gap: 56px;
    font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase;
  }
  .ticker-inner strong { color: var(--copper); font-weight: 500; }
  .ticker-inner span { opacity: 0.8; }
  @keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* Section base */
  .section { padding: 120px 0; border-top: 1px solid rgba(200,168,106,0.1); }
  .section-eyebrow {
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--copper);
    margin-bottom: 32px;
  }
  .section-title {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(36px, 5vw, 64px); line-height: 1.1; letter-spacing: -0.015em;
    max-width: 960px; margin-bottom: 40px;
  }
  .section-title .emphasis { font-style: italic; color: var(--copper); }
  .section-lede { font-size: 18px; line-height: 1.7; opacity: 0.85; max-width: 720px; margin-bottom: 64px; }

  /* UAS Consulting Services Section — immediately after hero */
  .uas-section {
    background: linear-gradient(180deg, var(--near-black) 0%, var(--near-black-soft) 100%);
    padding: 140px 0; position: relative; overflow: hidden;
  }
  .uas-section::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--copper), transparent);
    opacity: 0.4;
  }
  .uas-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center;
  }
  @media (max-width: 900px) { .uas-grid { grid-template-columns: 1fr; gap: 48px; } }
  .uas-headline {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(40px, 5.5vw, 68px); line-height: 1.08; letter-spacing: -0.015em;
  }
  .uas-headline .emphasis { font-style: italic; color: var(--copper); }
  .uas-body {
    font-size: 18px; line-height: 1.7; opacity: 0.9; margin-bottom: 32px;
  }
  .uas-body p + p { margin-top: 20px; }
  .uas-industries-list {
    display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 36px;
  }
  .uas-tag {
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 8px 14px; border: 1px solid rgba(200,168,106,0.4); color: var(--copper);
  }
  .uas-cta {
    display: inline-flex; align-items: center; gap: 14px;
    padding: 18px 36px; font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500;
    background: var(--copper); color: var(--near-black);
    transition: all 0.25s;
  }
  .uas-cta:hover { background: var(--cream); transform: translateY(-2px); }
  .uas-cta-arrow { transition: transform 0.25s; }
  .uas-cta:hover .uas-cta-arrow { transform: translateX(6px); }

  /* Problem section */
  .problem-stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; margin-bottom: 80px;
  }
  @media (max-width: 900px) { .problem-stats { grid-template-columns: repeat(2, 1fr); } }
  .stat {
    padding: 32px 24px; border: 1px solid rgba(200,168,106,0.2);
    background: rgba(26,23,19,0.5);
  }
  .stat-num {
    font-family: var(--serif); font-size: 56px; line-height: 1; color: var(--copper); margin-bottom: 12px;
  }
  .stat-label { font-size: 13px; line-height: 1.5; opacity: 0.8; }
  .problem-list { list-style: none; display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  @media (max-width: 800px) { .problem-list { grid-template-columns: 1fr; } }
  .problem-list li { display: flex; gap: 20px; padding: 24px; background: rgba(26,23,19,0.4); }
  .problem-list .num { font-family: var(--serif); color: var(--copper); font-size: 20px; min-width: 28px; }
  .problem-list .text { font-size: 15px; line-height: 1.65; opacity: 0.85; }
  .problem-list .text strong { color: var(--copper); font-weight: 500; display: block; margin-bottom: 4px; }

  /* Portfolio */
  .port-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 28px; }
  @media (max-width: 900px) { .port-grid { grid-template-columns: 1fr; } }
  .port-card {
    padding: 40px; border: 1px solid rgba(200,168,106,0.2); background: rgba(26,23,19,0.6);
    display: flex; flex-direction: column; min-height: 320px;
  }
  .port-tag { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--copper); margin-bottom: 24px; }
  .port-name { font-family: var(--serif); font-size: 40px; margin-bottom: 8px; }
  .port-sub { font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.7; margin-bottom: 24px; }
  .port-desc { font-size: 14px; line-height: 1.65; opacity: 0.85; flex: 1; margin-bottom: 24px; }
  .port-link { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--copper); }

  /* Consulting phases */
  .phases { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  @media (max-width: 900px) { .phases { grid-template-columns: 1fr; } }
  .phase { padding: 40px; border: 1px solid rgba(200,168,106,0.2); background: rgba(26,23,19,0.4); }
  .phase-num { font-family: var(--serif); font-size: 14px; letter-spacing: 0.3em; color: var(--copper); margin-bottom: 20px; }
  .phase-name { font-family: var(--serif); font-size: 28px; margin-bottom: 16px; }
  .phase-desc { font-size: 14px; line-height: 1.65; opacity: 0.85; margin-bottom: 24px; }
  .phase-deliv { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; padding-top: 20px; border-top: 1px solid rgba(200,168,106,0.15); color: var(--copper); }

  /* Capabilities */
  .caps { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  @media (max-width: 900px) { .caps { grid-template-columns: 1fr; } }
  .cap { padding: 40px; border: 1px solid rgba(200,168,106,0.2); background: rgba(26,23,19,0.4); }
  .cap-num { font-family: var(--serif); font-size: 14px; letter-spacing: 0.3em; color: var(--copper); margin-bottom: 20px; }
  .cap-name { font-family: var(--serif); font-size: 28px; line-height: 1.2; margin-bottom: 20px; }
  .cap-desc { font-size: 15px; line-height: 1.7; opacity: 0.88; margin-bottom: 24px; }
  .cap-desc em { color: var(--copper); font-style: italic; }
  .cap-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .cap-tag { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; padding: 6px 12px; border: 1px solid rgba(200,168,106,0.3); color: var(--copper); }

  /* Markets */
  .markets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  @media (max-width: 900px) { .markets { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 600px) { .markets { grid-template-columns: 1fr; } }
  .market { padding: 32px 28px; border: 1px solid rgba(200,168,106,0.2); background: rgba(26,23,19,0.4); transition: all 0.3s; }
  .market:hover { border-color: var(--copper); background: rgba(26,23,19,0.7); transform: translateY(-3px); }
  .market-code { font-family: var(--serif); font-size: 14px; letter-spacing: 0.3em; color: var(--copper); margin-bottom: 20px; }
  .market-name { font-family: var(--serif); font-size: 22px; line-height: 1.25; margin-bottom: 14px; }
  .market-desc { font-size: 14px; line-height: 1.6; opacity: 0.82; }

  /* Team */
  .team { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  @media (max-width: 800px) { .team { grid-template-columns: 1fr; } }
  .person { padding: 40px; border: 1px solid rgba(200,168,106,0.2); background: rgba(26,23,19,0.4); }
  .person-initials { font-family: var(--serif); font-size: 40px; color: var(--copper); margin-bottom: 20px; }
  .person-name { font-family: var(--serif); font-size: 28px; margin-bottom: 4px; }
  .person-role { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.7; margin-bottom: 20px; }
  .person-bio { font-size: 14px; line-height: 1.7; opacity: 0.85; }

  /* Engage */
  .engage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; }
  @media (max-width: 900px) { .engage-grid { grid-template-columns: 1fr; gap: 48px; } }
  .engage-left .contact { margin-bottom: 32px; }
  .engage-left .contact-label { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--copper); margin-bottom: 8px; }
  .engage-left .contact-value { font-family: var(--serif); font-size: 22px; }
  .engage-left .download-card { margin-top: 40px; padding: 32px; border: 1px solid rgba(200,168,106,0.3); background: rgba(26,23,19,0.5); }
  .engage-left .download-card h4 { font-family: var(--serif); font-size: 22px; margin-bottom: 8px; }
  .engage-left .download-card p { font-size: 13px; opacity: 0.8; margin-bottom: 20px; }
  .form-group { margin-bottom: 20px; }
  .form-label { display: block; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--copper); margin-bottom: 8px; }
  .form-control, textarea.form-control, select.form-control {
    width: 100%; padding: 14px; font-family: inherit; font-size: 14px; font-weight: 300;
    background: rgba(26,23,19,0.6); border: 1px solid rgba(200,168,106,0.25); color: var(--cream);
  }
  textarea.form-control { resize: vertical; min-height: 120px; }
  .form-control:focus { outline: none; border-color: var(--copper); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

  /* Footer */
  .footer { padding: 60px 0 40px; border-top: 1px solid rgba(200,168,106,0.15); }
  .footer-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 24px; }
  .footer-brand { font-family: var(--serif); font-size: 16px; }
  .footer-links { display: flex; gap: 28px; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.75; }
  .footer-copy { margin-top: 24px; text-align: center; font-size: 11px; opacity: 0.5; letter-spacing: 0.1em; }

  /* ==================== INDUSTRIES SCREEN ==================== */
  .industries-screen { min-height: 100vh; padding: 140px 0 120px; }
  .industries-hero {
    max-width: 900px; margin-bottom: 80px;
  }
  .industries-hero .section-title { margin-bottom: 24px; }
  .industries-back {
    display: inline-flex; align-items: center; gap: 10px; font-size: 12px;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--copper);
    margin-bottom: 40px; transition: transform 0.2s;
  }
  .industries-back:hover { transform: translateX(-4px); }
  .industries-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px;
  }
  @media (max-width: 800px) { .industries-grid { grid-template-columns: 1fr; } }
  .industry-card {
    position: relative; padding: 48px 44px; min-height: 280px;
    border: 1px solid rgba(200,168,106,0.2); background: rgba(26,23,19,0.5);
    cursor: pointer; transition: all 0.3s; overflow: hidden;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .industry-card::before {
    content: ''; position: absolute; top: 0; left: 0; width: 0; height: 2px;
    background: var(--copper); transition: width 0.4s;
  }
  .industry-card:hover { border-color: var(--copper); background: rgba(26,23,19,0.8); transform: translateY(-4px); }
  .industry-card:hover::before { width: 100%; }
  .industry-card-num { font-family: var(--serif); font-size: 14px; letter-spacing: 0.3em; color: var(--copper); margin-bottom: 20px; }
  .industry-card-name { font-family: var(--serif); font-size: 34px; line-height: 1.1; margin-bottom: 16px; }
  .industry-card-tagline { font-size: 14px; line-height: 1.6; opacity: 0.85; margin-bottom: 32px; font-style: italic; }
  .industry-card-cta { font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--copper); display: inline-flex; align-items: center; gap: 10px; }
  .industry-card-cta-arrow { transition: transform 0.25s; }
  .industry-card:hover .industry-card-cta-arrow { transform: translateX(6px); }

  /* ==================== INDUSTRY DETAIL PAGE ==================== */
  .industry-detail { min-height: 100vh; padding: 120px 0 80px; }
  .industry-detail-back {
    display: inline-flex; align-items: center; gap: 10px; font-size: 12px;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--copper);
    margin-bottom: 40px; transition: transform 0.2s;
  }
  .industry-detail-back:hover { transform: translateX(-4px); }

  .id-hero {
    padding: 60px 0 80px; border-bottom: 1px solid rgba(200,168,106,0.15);
    margin-bottom: 80px;
  }
  .id-eyebrow { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--copper); margin-bottom: 24px; }
  .id-title {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(44px, 6.5vw, 80px); line-height: 1.05; letter-spacing: -0.02em;
    margin-bottom: 28px;
  }
  .id-title .emphasis { font-style: italic; color: var(--copper); }
  .id-tagline {
    font-size: 22px; line-height: 1.5; max-width: 820px;
    color: var(--cream-soft); font-family: var(--serif); font-style: italic;
  }

  .id-section { margin-bottom: 80px; }
  .id-section-label {
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--copper);
    margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid rgba(200,168,106,0.2);
  }
  .id-section-head {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(30px, 4vw, 44px); line-height: 1.1; letter-spacing: -0.01em;
    margin-bottom: 36px;
  }

  /* Comparison table */
  .compare-grid {
    display: grid; grid-template-columns: 180px 1fr 1fr; gap: 0;
    border: 1px solid rgba(200,168,106,0.25);
  }
  @media (max-width: 800px) { .compare-grid { grid-template-columns: 1fr; } }
  .compare-head {
    padding: 20px 24px; background: rgba(26,23,19,0.8);
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    border-bottom: 1px solid rgba(200,168,106,0.2);
  }
  .compare-head.trad { color: rgba(240,232,212,0.7); }
  .compare-head.drone { color: var(--copper); }
  .compare-cell {
    padding: 24px; border-bottom: 1px solid rgba(200,168,106,0.1);
    font-size: 15px; line-height: 1.55;
  }
  .compare-cell.axis {
    background: rgba(26,23,19,0.6); font-size: 12px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--copper); font-weight: 500;
  }
  .compare-cell.trad { opacity: 0.75; }
  .compare-cell.drone { color: var(--cream); }
  .compare-cell.drone strong { color: var(--copper); font-weight: 500; }
  @media (max-width: 800px) {
    .compare-head { display: none; }
    .compare-cell.axis { padding-bottom: 8px; border-bottom: none; }
    .compare-cell.trad::before { content: 'Traditional —'; color: var(--copper); opacity: 0.7; display: block; font-size: 11px; letter-spacing: 0.14em; margin-bottom: 6px; }
    .compare-cell.drone::before { content: 'Drone —'; color: var(--copper); display: block; font-size: 11px; letter-spacing: 0.14em; margin-bottom: 6px; }
  }

  /* Quote */
  .id-quote {
    padding: 48px 56px; background: rgba(26,23,19,0.6);
    border-left: 3px solid var(--copper);
    position: relative;
  }
  @media (max-width: 600px) { .id-quote { padding: 36px 32px; } }
  .id-quote-text {
    font-family: var(--serif); font-style: italic; font-size: 26px; line-height: 1.4;
    margin-bottom: 24px; color: var(--cream);
  }
  @media (max-width: 600px) { .id-quote-text { font-size: 20px; } }
  .id-quote-attrib { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--copper); }

  /* Case study / horror story */
  .id-story-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 800px) { .id-story-grid { grid-template-columns: 1fr; } }
  .id-story {
    padding: 40px; background: rgba(26,23,19,0.55); border: 1px solid rgba(200,168,106,0.2);
    display: flex; flex-direction: column;
  }
  .id-story.horror { border-color: rgba(180,60,40,0.3); background: rgba(30,15,12,0.5); }
  .id-story-label {
    font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--copper); margin-bottom: 16px;
  }
  .id-story.horror .id-story-label { color: #d47560; }
  .id-story-title {
    font-family: var(--serif); font-size: 24px; line-height: 1.25; margin-bottom: 18px;
  }
  .id-story-body { font-size: 15px; line-height: 1.7; opacity: 0.88; flex: 1; }
  .id-story-body strong { color: var(--copper); font-weight: 500; }
  .id-story.horror .id-story-body strong { color: #d47560; }
  .id-story-source { margin-top: 20px; font-size: 11px; letter-spacing: 0.1em; opacity: 0.55; padding-top: 16px; border-top: 1px solid rgba(200,168,106,0.12); }

  /* ROI Calculator */
  .roi-block {

function useRoute() {
  const [route, setRoute] = useState(() => window.location.hash || '#/');

  useEffect(() => {
    const handler = () => setRoute(window.location.hash || '#/');
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);

  return [route, (r) => { window.location.hash = r; window.scrollTo({ top: 0, behavior: 'smooth' }); }];
}

function App() {
  const [route, navigate] = useRoute();

  // Handle in-page anchors when navigating to #/#section
  useEffect(() => {
    if (route.startsWith('#/#')) {
      const anchor = route.slice(3);
      setTimeout(() => {
        const el = document.getElementById(anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
      }, 50);
    } else {
      window.scrollTo({ top: 0 });
    }
  }, [route]);

  let page;
  if (route === '#/industries' || route === '#/industries/') {
    page = <IndustriesScreen onNavigate={navigate} />;
  } else if (route.startsWith('#/industries/')) {
    const slug = route.slice('#/industries/'.length).replace(/\/$/, '');
    page = <IndustryDetail slug={slug} onNavigate={navigate} />;
  } else {
    page = <Homepage onNavigate={navigate} />;
  }

  return (
    <div className="shell">
      <Nav onNavigate={navigate} />
      {page}
      <Footer onNavigate={navigate} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
